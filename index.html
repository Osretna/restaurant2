<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة فودي بلس لخدمات المطاعم - Foody Plus SaaS</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/000000/restaurant.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F97316" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/restaurant.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('ServiceWorker registered successfully:', reg.scope))
            .catch(err => console.log('ServiceWorker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
